<div>
    <sly-field title="Download options" description="Select what to download">
        <el-radio-group v-model="state.download">
            <el-radio label="all">json annotations + images</el-radio>
            <el-radio label="only_json">only json annotations</el-radio>
        </el-radio-group>
    </sly-field>
    <sly-field title="Image extension"
               description="For example, image 'abc.jpg' has jpg extension but the actual image data is in PNG format.
                                              Such cases will be resolved and image will be exported as 'abc.jpg.png'">
        <el-checkbox v-model="state.fixExtension">fix image extension based on image MIME type</el-checkbox>
    </sly-field>
    <div v-if="state.collectionId || context.collectionId || (state.entityIds && state.entityIds.length) || (context.entityIds && context.entityIds.length)">
        <sly-field title="Dataset structure"
                   description="Keep the original dataset structure or place all selected images into a single dataset">
            <el-checkbox v-model="state.preserveStructure">preserve dataset structure</el-checkbox>
        </sly-field>
        <sly-field v-if="!state.preserveStructure"
                   title="Dataset name"
                   description="Name of the dataset all selected images will be placed into">
            <el-input v-model="state.datasetName"
                      :placeholder="(state.collectionId || context.collectionId) ? ('Collection ' + (state.collectionId || context.collectionId)) : 'Selected images'"></el-input>
        </sly-field>
    </div>
</div>
